<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticker Collection Vending Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=Kelly+Slab&family=Audiowide&display=swap" rel="stylesheet">
  <style>
    :root {
      --panel-bg: rgba(0, 0, 0, 0.45);
      --panel-border: rgba(255, 255, 255, 0.18);
      --text-light: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.84);
      --accent: #ffe96b;
      --danger: #ff8a8a;
      --success: #9cffb8;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Kelly Slab', cursive;
      background: url('https://daryeaye.github.io/stickercollection1/Mac4.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-light);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: min(1040px, 100%);
      display: flex;
      gap: 24px;
      align-items: stretch;
    }

    .panel {
      flex: 1;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 28px;
      min-height: 560px;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .title {
      font-family: 'Audiowide', cursive;
      font-size: clamp(28px, 3vw, 38px);
      line-height: 1.15;
      margin: 0 0 12px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .subtitle {
      margin: 0 0 28px;
      font-size: 18px;
      color: var(--text-soft);
      max-width: 420px;
      line-height: 1.45;
    }

    .field-wrap {
      width: min(420px, 100%);
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 14px;
      border: none;
      outline: none;
      font-size: 24px;
      text-align: center;
      font-family: 'Kelly Slab', cursive;
      background: rgba(255, 255, 255, 0.94);
      color: #222;
    }

    #c {
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .tip {
      font-size: 15px;
      color: var(--text-soft);
      margin: 6px 0 0;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      padding: 13px 22px;
      border-radius: 14px;
      font-size: 22px;
      font-family: 'Kelly Slab', cursive;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary-btn {
      background: linear-gradient(180deg, #ffe96b 0%, #ffcb47 100%);
      color: #2d2200;
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .right {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #r {
      min-height: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
    }

    .placeholder-title {
      font-size: 30px;
      margin: 0;
    }

    .placeholder-text {
      font-size: 18px;
      color: var(--text-soft);
      max-width: 360px;
      line-height: 1.5;
      margin: 0;
    }

    .message {
      font-size: 24px;
      margin: 0;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--success);
    }

    .spinner {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 7px solid rgba(255, 255, 255, 0.24);
      border-top-color: var(--accent);
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .countdown-number {
      font-family: 'Audiowide', cursive;
      font-size: clamp(72px, 14vw, 120px);
      line-height: 1;
      margin: 8px 0;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(255, 233, 107, 0.35);
      animation: pulseCount 0.75s ease;
    }

    @keyframes pulseCount {
      0% {
        transform: scale(0.55);
        opacity: 0;
      }
      40% {
        transform: scale(1.08);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .output-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .ic {
      position: relative;
      display: inline-block;
      background: transparent;
    }

    .sticker-pop {
      animation: stickerPop 0.7s cubic-bezier(0.2, 1.2, 0.3, 1);
      transform-origin: center bottom;
    }

    @keyframes stickerPop {
      0% {
        transform: translateY(80px) scale(0.2);
        opacity: 0;
      }
      45% {
        transform: translateY(-10px) scale(1.08);
        opacity: 1;
      }
      70% {
        transform: translateY(4px) scale(0.96);
        opacity: 1;
      }
      100% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .sticker-img {
      width: min(320px, 80vw);
      height: min(320px, 80vw);
      object-fit: contain;
      display: block;
    }

    .wm {
      position: absolute;
      right: 8px;
      bottom: 8px;
      font-size: 24px;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(0, 0, 0, 0.42);
      padding: 4px 8px;
      border-radius: 8px;
      max-width: 88%;
      word-break: break-word;
    }

    .author {
      text-align: center;
      font-size: 16px;
      color: rgba(255, 255, 255, 0.88);
      margin-top: 18px;
    }

    @media (max-width: 860px) {
      .container {
        flex-direction: column;
      }

      .panel {
        min-height: auto;
      }

      .left {
        padding-top: 38px;
        padding-bottom: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel left">
      <h1 class="title">Sticker Collection<br>Vending Machine</h1>
      <p class="subtitle">Type your name and enter your 9-letter code to redeem a surprise sticker.</p>

      <div class="field-wrap">
        <input type="text" id="n" placeholder="Enter your name" maxlength="20" autocomplete="off">
      </div>

      <div class="field-wrap">
        <input type="text" id="c" placeholder="Enter 9-letter code" maxlength="9" autocomplete="off" spellcheck="false">
        <p class="tip">Use 9 letters only. The box auto-capitalizes your code.</p>
      </div>

      <div class="buttons">
        <button class="primary-btn" id="submitBtn" type="button">Submit</button>
        <button class="secondary-btn" id="clearBtn" type="button">Clear</button>
      </div>
    </div>

    <div class="panel right">
      <div id="r">
        <p class="placeholder-title">Ready to redeem</p>
        <p class="placeholder-text">Enter your name and code to see what the machine gives you.</p>
      </div>
      <p class="author">©True PBL by XDY. All rights reserved. </p>
    </div>
  </div>

  <script>
    (() => {
      const _E = [
        '106.113.115.49.57.52.56.115',
        '106.113.115.49.59.52.114',
        '106.113.115.49.58.113',
        '106.113.115.49.52.53.112',
        '106.113.115.49.57.111',
        '106.113.115.49.52.54.110',
        '106.113.115.49.59.55.109',
        '106.113.115.49.54.56.108',
        '106.113.115.49.55.53.107',
        '106.113.115.49.57.106',
        '106.113.115.49.55.52.105',
        '106.113.115.49.54.52.104',
        '106.113.115.49.53.53.103',
        '106.113.115.49.51.55.102',
        '106.113.115.49.54.100',
        '106.113.115.49.52.101',
        '106.113.115.49.53.54.122',
        '106.113.115.49.54.54.121',
        '106.113.115.49.51.52.122',
        '106.113.115.49.53.52.116',
        '106.113.115.49.57.51.117',
        '106.113.115.49.54.53.120',
        '106.113.115.49.51.53.119',
        '106.113.115.49.54.52.118'
      ];

      const _nameInput = document.getElementById('n');
      const _codeInput = document.getElementById('c');
      const _resultBox = document.getElementById('r');
      const _submitBtn = document.getElementById('submitBtn');
      const _clearBtn = document.getElementById('clearBtn');

      let _imageUrlGlobal = '';

      const _base = ['https://', 'daryeaye', '.github.io', '/stickercollection1/'].join('');

      const _decodeFile = (token) => token
        .split('.')
        .map(n => String.fromCharCode(Number(n) - 3))
        .reverse()
        .join('');

      const _pickStickerUrl = () => {
        const token = _E[Math.floor(Math.random() * _E.length)];
        return _base + _decodeFile(token);
      };

      const _sanitizeCode = (code) => (code || '').toUpperCase().replace(/[^A-Z]/g, '');

      const _escapeHtml = (text) => text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');

      const _showMessage = (text, type = '') => {
        _resultBox.innerHTML = `<p class="message ${type}">${_escapeHtml(text)}</p>`;
      };

      const _showProcessing = () => {
        _resultBox.innerHTML = `
          <div class="spinner"></div>
          <p class="message">Processing your code...</p>
        `;
      };

      const _showSticker = (userName, imageUrl, message = 'Code accepted! Here is your sticker.') => {
        _imageUrlGlobal = imageUrl;
        _resultBox.innerHTML = `
          <p class="message success">${_escapeHtml(message)}</p>
          <div class="output-container">
            <div class="ic sticker-pop" id="screenshotContainer">
              <img class="sticker-img" src="${imageUrl}" alt="Sticker" crossorigin="anonymous">
              <div class="wm">${_escapeHtml(userName)}</div>
            </div>
            <button class="primary-btn" id="downloadBtn" type="button">Download Screenshot</button>
          </div>
        `;

        document.getElementById('downloadBtn').addEventListener('click', _downloadScreenshot);
      };

      const _delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      const _countdownReveal = async (userName, imageUrl, message) => {
        const steps = ['3', '2', '1'];

        for (const step of steps) {
          _resultBox.innerHTML = `
            <p class="message success">Code accepted!</p>
            <div class="countdown-number">${step}</div>
            <p class="placeholder-text">Your sticker is coming...</p>
          `;
          await _delay(800);
        }

        _showSticker(userName, imageUrl, message);
      };

      const _submitInfo = async () => {
        const userName = _nameInput.value.trim();
        const code = _sanitizeCode(_codeInput.value);

        _codeInput.value = code;

        if (!userName || code.length !== 9) {
          _showMessage('Please enter your name and a valid 9-letter code.', 'error');
          return;
        }

        if (!/^[A-Z]{9}$/.test(code)) {
          _showMessage('Codes must use letters only.', 'error');
          return;
        }

        _showProcessing();
        await _delay(700);

        try {
          const response = await fetch('/redeem', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              code: code,
              studentName: userName
            })
          });

          const result = await response.json();

          if (!result.success) {
            _showMessage(result.message || 'Something went wrong. Please try again.', 'error');
            return;
          }

          await _countdownReveal(
            userName,
            _pickStickerUrl(),
            result.message || 'Code accepted! Here is your sticker.'
          );
        } catch (error) {
          _showMessage('Network error. Please try again.', 'error');
        }
      };

      const _clearAll = () => {
        _nameInput.value = '';
        _codeInput.value = '';
        _imageUrlGlobal = '';
        _resultBox.innerHTML = `
          <p class="placeholder-title">Ready to redeem</p>
          <p class="placeholder-text">Enter your name and code to see what the machine gives you.</p>
        `;
        _nameInput.focus();
      };

      const _downloadScreenshot = () => {
        const userName = _nameInput.value.trim();
        const imgEl = document.querySelector('#screenshotContainer .sticker-img');

        if (!userName || !imgEl || !_imageUrlGlobal) {
          alert('Missing image or name. Please try again.');
          return;
        }

        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');

          const w = img.naturalWidth;
          const h = img.naturalHeight;

          canvas.width = w;
          canvas.height = h;

          ctx.clearRect(0, 0, w, h);
          ctx.globalAlpha = 1;
          ctx.drawImage(img, 0, 0, w, h);

          const fontSize = Math.max(22, Math.round(w * 0.06));
  await document.fonts.load(`${fontSize}px "Kelly Slab"`);
  ctx.font = `${fontSize}px "Kelly Slab"`;
  ctx.textBaseline = 'bottom';

          const paddingX = Math.round(fontSize * 0.45);
          const paddingY = Math.round(fontSize * 0.3);
          const text = userName;
          const textWidth = ctx.measureText(text).width;

          const boxW = textWidth + paddingX * 2;
          const boxH = fontSize + paddingY * 2;

          const x = w - boxW - 12;
          const y = h - boxH - 12;

          ctx.fillStyle = 'rgba(0, 0, 0, 0.42)';
          roundRect(ctx, x, y, boxW, boxH, 10);
          ctx.fill();

          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.fillText(text, x + paddingX, y + boxH - paddingY);

          const imageData = canvas.toDataURL('image/png');
          const downloadLink = document.createElement('a');
          downloadLink.href = imageData;
          downloadLink.download = `${userName}.png`;
          document.body.appendChild(downloadLink);
          downloadLink.click();
          document.body.removeChild(downloadLink);
        };

        img.onerror = () => {
          alert('Could not load the sticker image for download.');
        };

        img.src = _imageUrlGlobal;
      };

      function roundRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      _codeInput.addEventListener('input', () => {
        const cursorAtEnd = _codeInput.selectionStart === _codeInput.value.length;
        _codeInput.value = _sanitizeCode(_codeInput.value).slice(0, 9);
        if (cursorAtEnd) {
          _codeInput.setSelectionRange(_codeInput.value.length, _codeInput.value.length);
        }
      });

      _codeInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') _submitInfo();
      });

      _nameInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') _submitInfo();
      });

      _submitBtn.addEventListener('click', _submitInfo);
      _clearBtn.addEventListener('click', _clearAll);
    })();
  </script>
</body>
</html>
